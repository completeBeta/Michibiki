syntax = "proto3";

package mihon;

message Backup {
    repeated BackupManga backupManga = 1;
    repeated BackupCategory backupCategories = 2;
    repeated BackupExtensionStore backupExtensions = 3;
    repeated BackupSource backupSources = 4;
    BackupPreference backupPreferences = 5;
    int32 version = 6;
}

message BackupManga {
    int64 source = 1;
    string url = 2;
    string title = 3;
    optional string artist = 4;
    optional string author = 5;
    optional string description = 6;
    repeated string genre = 7;
    int32 status = 8;
    optional string thumbnailUrl = 9;
    int64 dateAdded = 13;
    int32 viewer = 14;
    repeated BackupChapter chapters = 16;
    repeated int64 categories = 17;
    repeated BackupTracking tracking = 18;
    bool favorite = 100;
    int32 chapterFlags = 101;
    optional int32 viewer_flags = 103;
    repeated BackupHistory history = 104;
    int32 updateStrategy = 105;
    int64 lastModifiedAt = 106;
    optional int64 favoriteModifiedAt = 107;
    repeated string excludedScanlators = 108;
    int64 version = 109;
    string notes = 110;
    bool initialized = 111;
}

message BackupChapter {
    string url = 1;
    string name = 2;
    string scanlator = 3;
    bool read = 4;
    bool bookmark = 5;
    int64 lastPageRead = 6;
    int64 dateFetch = 7;
    int64 dateUpload = 8;
    float chapterNumber = 9;
    int64 sourceOrder = 10;
    int64 lastModifiedAt = 11;
}

message BackupTracking {
    int32 syncId = 1;
    int64 libraryId = 2;
    int32 mediaIdInt = 3;
    string trackingUrl = 4;
    string title = 5;
    float lastChapterRead = 6;
    int32 totalChapters = 7;
    float score = 8;
    int32 status = 9;
    int64 startedReadingDate = 10;
    int64 finishedReadingDate = 11;
    bool private = 12;
    int64 mediaId = 100;
}

message BackupCategory {
    string name = 1;
    int64 order = 2;
    int64 flags = 3;
}

message BackupExtensionStore {
    string name = 1;
    string apkName = 2;
    string pkgName = 3;
    int64 versionCode = 4;
    string signatureHash = 5;
    bool installed = 6;
}

message BackupSource {
    string name = 1;
    int64 sourceId = 2;
}

message BackupPreference {
    // Custom preference key-value pairs
    // These are stored as a repeated field of PreferenceEntry
}

message BackupHistory {
    string url = 1;
    int64 lastRead = 2;
    int64 readDuration = 3;
}
