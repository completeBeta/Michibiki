services:
  michibiki:
    build: .
    container_name: michibiki
    restart: unless-stopped
    environment:
      - SUWAYOMI_URL=http://suwayomi:4567/api/graphql
      - ANILIST_TOKEN=${ANILIST_TOKEN}
      - POLL_INTERVAL_SECONDS=86400
      - DRY_RUN=${DRY_RUN:-true}
      - BACKUP_DIR=/app/backups
      - MODE=watch
      - POPULATE_SUWAYOMI=true
      - CLEAR_SUWAYOMI_FIRST=false   # let it populate fresh, no old data to clear
    volumes:
      - /opt/docker/michibiki/data:/app/data
      - /home/syncthing/data/mihon-backups:/app/backups
    depends_on:
      - suwayomi

  suwayomi:
    image: ghcr.io/suwayomi/suwayomi-server:latest
    container_name: suwayomi
    restart: unless-stopped
    ports:
      - "4567:4567"
    volumes:
      - /opt/docker/suwayomi/data:/home/suwayomi/.local/share/Tachidesk
      - /opt/docker/suwayomi/config:/home/suwayomi/.local/share/Tachidesk-config
      - ${SUWAYOMI_DOWNLOADS_DIR:-/opt/docker/suwayomi/data/downloads}:/home/suwayomi/.local/share/Tachidesk/downloads
