<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ manga.title }} — Michibiki</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
      --green: #3fb950; --red: #f85149; --orange: #d2991d; --radius: 6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6;
      max-width: 960px; margin: 0 auto; padding: 2rem 1rem;
    }
    h1 { font-size: 1.5rem; color: var(--accent); }
    h2 { font-size: 1.1rem; margin: 1.5rem 0 0.75rem; }
    a { color: var(--accent); text-decoration: none; }
    .back-link { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; display: inline-block; }

    .controls {
      display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center;
      margin: 1rem 0; padding: 1rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
    }
    .controls label { font-size: 0.85rem; color: var(--muted); display: flex; align-items: center; gap: 0.3rem; }
    .controls input[type="text"], .controls input[type="number"] {
      width: 80px; padding: 0.4rem 0.5rem; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 0.85rem;
    }
    .controls input[type="checkbox"] { accent-color: var(--accent); }

    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--surface); color: var(--text); font-size: 0.85rem;
      font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary { background: #238636; border-color: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; border-color: #2ea043; color: #fff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .chapter-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.35rem;
    }
    .chapter-item {
      padding: 0.4rem 0.6rem; background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; font-size: 0.82rem; display: flex; justify-content: space-between; align-items: center;
    }
    .chapter-item.downloaded { border-color: var(--green); }
    .chapter-item .ch-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .chapter-item.downloaded .ch-dot { background: var(--green); }

    #flash { margin: 1rem 0; }
    .flash { padding: 0.75rem 1rem; border-radius: var(--radius); font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; }
    .flash-info { background: #1f3a5f; border: 1px solid #388bfd; color: var(--accent); }
    .flash-success { background: #1a3a1a; border: 1px solid var(--green); color: var(--green); }
    .flash-error { background: #3a1a1a; border: 1px solid var(--red); color: var(--red); }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--muted); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 0.5rem; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }

    .stat-row { display: flex; gap: 2rem; margin: 0.5rem 0; font-size: 0.85rem; color: var(--muted); }
    .stat-row strong { color: var(--text); }

    @media (max-width: 600px) {
      body { padding: 1rem 0.5rem; }
      .controls { flex-direction: column; align-items: flex-start; }
      .chapter-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>

<a href="/" class="back-link">← Back to library</a>
<h1>{{ manga.title }}</h1>
<div class="stat-row">
  <span>📄 <strong>{{ manga.chapters.nodes|length }}</strong> chapters</span>
  <span>✅ <strong>{{ manga.downloadCount }}</strong> downloaded</span>
</div>

<!-- Download controls -->
<form
  class="controls"
  hx-post="/download"
  hx-target="#flash"
  hx-swap="innerHTML"
  hx-indicator="#download-spinner"
>
  <input type="hidden" name="manga_id" value="{{ manga.id }}">
  <input type="hidden" name="manga_title" value="{{ manga.title }}">

  <label><input type="radio" name="action" value="all" checked> All</label>
  <label><input type="radio" name="action" value="range"> Range
    <input type="text" name="chapter_range" placeholder="1-50" style="width:80px">
  </label>
  <label><input type="radio" name="action" value="limit"> First
    <input type="number" name="limit" value="50" min="1" style="width:70px">
  </label>
  <label title="Preview without downloading"><input type="checkbox" name="dry_run" value="true"> Dry Run</label>
  <button type="submit" class="btn btn-primary" id="download-btn">Download</button>
  <a href="/manga/{{ manga.id }}/download" class="btn" style="text-decoration:none"
   onclick="document.getElementById('flash').innerHTML='<div class=\'flash flash-info\'><span class=\'spinner\'></span> Preparing zip — this may take a minute for large libraries...</div>'; return true;">📦 Download Zip</a>
  <span id="download-spinner" class="htmx-indicator spinner"></span>
</form>
<script>
  // Force-hide stuck spinner if HTMX fails to clean up
  document.body.addEventListener('htmx:afterRequest', function(evt) {
    var spinner = document.getElementById('download-spinner');
    if (spinner) spinner.style.display = 'none';
  });
</script>

<div id="flash" hx-on::after-settle="if(!this.querySelector('.flash-info')) this.removeAttribute('hx-on')"></div>

<h2>Chapters</h2>
<div class="chapter-grid">
  {% for ch in manga.chapters.nodes %}
    <div class="chapter-item {% if ch.isDownloaded %}downloaded{% endif %}"
         title="Ch. {{ ch.chapterNumber }} — {{ ch.name }}">
      <span>{{ "%.1f"|format(ch.chapterNumber|float) if ch.chapterNumber else '?' }}</span>
      <span class="ch-dot"></span>
    </div>
  {% endfor %}
</div>

<footer style="margin-top:2rem; text-align:center; font-size:0.8rem; color:var(--muted);">
  Michibiki WebUI · <a href="/">Library</a>
</footer>

</body>
</html>
